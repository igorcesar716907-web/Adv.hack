
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techcorp Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <div class="status-bar">
            <span class="piscante">⚠️ SISTEMA MONITORADO: FIREWALL ATIVO</span>
        </div>
        <div id="output" class="output"></div>
        <div class="input-line">
            <span class="prompt">C:\TECHCORP\SISTEMA\></span>
            <span id="range-display" class="range-info">[1-100]</span>
            <input type="number" id="guess-input" inputmode="numeric" pattern="[0-9]*" placeholder="00">
            <button id="guess-btn">EXECUTAR</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
